<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 运维检测台</title>
    <link rel="stylesheet" href="./login.css" />
    <style>[hidden]{display:none!important}.password-control{position:relative}.password-control input{padding-right:54px!important}.password-toggle{position:absolute;right:8px;top:13px;border:0;background:transparent;color:#4f6df5;font:600 12px Arial,sans-serif;cursor:pointer}.field-error{display:block;min-height:16px;margin-top:5px;color:#d84d55;font-size:12px;font-weight:400}</style>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="login-brand"><span>运</span><b>运维检测台</b></div>
        <div class="login-heading"><p>内部运维平台</p><h1 id="login-title">登录工作台</h1><small id="login-copy">使用你的账号访问资产与巡检数据</small></div>
        <form id="login-form" autocomplete="off">
          <label id="display-name-field" hidden>姓名<input id="display-name" autocomplete="name" placeholder="例如：青山" /><small class="field-error" id="display-name-error"></small></label>
          <label>账号<input id="username" autocomplete="username" required placeholder="例如：qingshan" /><small class="field-error" id="username-error"></small></label>
          <label id="password-field">密码<div class="password-control"><input id="password" type="password" minlength="8" maxlength="32" autocomplete="new-password" required placeholder="8-32 位，含字母、数字和特殊符号" /><button type="button" class="password-toggle" data-password-toggle="password">显示</button></div><small class="field-error" id="password-error"></small></label>
          <div class="login-options"><label><input id="remember-session" type="checkbox" />记住密码</label></div>
          <p class="form-error" id="login-error" role="alert"></p>
          <button class="login-submit" id="login-submit">登录</button>
        </form>
      </section>
    </main>
    <script src="./login.js"></script>
  </body>
</html>
